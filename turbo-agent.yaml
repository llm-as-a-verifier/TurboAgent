progress_monitor:             # optional, post-hoc: scores the selected trajectory
  model:                      # with llm_verifier.track. Runs AFTER the response
    name: gemini/gemini-2.5-flash   # is selected; it never changes it.
    api_key: $VERTEX_API_KEY        # Surfaced in the visualizer.
    provider: vertex_ai

  n_verifications: 1          # K: repeated verifications (averaged)
